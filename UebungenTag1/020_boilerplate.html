<!DOCTYPE html>
<!-- Der DOCTYPE sagt dem Browser: "Das ist eine HTML Seite!"-->

<html lang="de">
    <!--<html> ist das Wurzelelemnet der Seite.
        Wurzelelement = das oberste HTML-Element, das ALLLE anderen Elemente umschließt.
        Also alles ways zur Webseite gehört (<head>, <body>, Inhalte etc.) liegen innerhalb diese <html>...</html> Tags.
            
            Typische Sprachcodes: de = Deutsch / en = Englisch / fr = Französisch / es = Spanisch ... etc. -->

            <head>
                <!-- <head> enthält die Metadaten = Infos über die Seite die NICHT sichtbar sind.-->

                    <meta charset="UTF-8">
                    <!-- Legt die Zeichencodierung fest
                        UTF-8 -> Umlaute und Sonderzeichen können korrekt angezeigt werden (ä, ö, ü, €, etc.)-->

                    <meta name="viewport" content="width, initial-scale=1.0">
                    <!-- Sorgt dafür, dass die Seite auf dem Handy und Tablet richtig skaliert wird (= Responsitive Design).
                         name="viewport" -> Diese Einstellungbetrifft den sichtbaren Bereich unserer Webseite, welche wir auf unserem Gerät anschauen.
                        width=device-widht -> Die Breite der Seite soll sich an die Breite des Gerätes anpassen
                        1.0 bedeutet 100% Zoom (Standardgröße)
                        0.5 bedeutet 50% Zoom (alles kleiner)
                        2.0 bedeutet 200% Zoom (alles größer) -> NICHT empfohlen-->

                    <title>Boilerplate</title>
                    <!-- Titel der Seite
                        -> erscheint im Browser Tab und natürlich google in den Suchergebnissen.-->
            </head>
            
            <body>
            <!-- <body enthält alles was der Webseite sichtbar ist-->

                <header>
                    <!-- Kopfbereich der Seite und enthält z.B. Logo, Überschrift und Navigation, Login, Anmeldung -->

                    <h1>Hallo HTML!</h1>
                    <!-- <h1> ist eine Überschrift
                        -> Überschrift der ersten Ordnung und darf nur EINMAL pro Seite genutzt werden-->
                </header>

                <main>
                    <!-- Hauptteil der Seite
                        -> Typisch Inhalte: Texte, Artikel, Bilder, Inhalte welche die Themen der Seite erklären sollen. -->

                    <p>Hier beginnt eure eigentliche Webseite (Alles was ihr an Inhalten habt)!</p>
                    <!-- <p> steht für Paragraph = Absatz-->
                </main>

                <footer>
                    <!-- Fußbereich der Seite und der enthält z.B.: Copyrights, Links, Kontakte etc.-->

                    <p>&copy; 2026 Mein Name</p>
                    <!-- &copy; steht für das Copyright-Zeichen
                            HTML versteht manche Zeichen nicht direkt oder sie können euch Probleme bereiten. Deshalb gibt es Entities (Ersatzschreibweisen).-->
                </footer>
            </body>
</html>
